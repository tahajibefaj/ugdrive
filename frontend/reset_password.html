<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UG Drive — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--green:#2ea043;--green-h:#3fb950;--green-glow:#56d364;--green-bg:#0f2d1a;--green-border:#196127;--red:#f85149;--red-bg:#2d1b1b;}
:root[data-theme="light"]{--bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--border:#d0d7de;--text:#1f2328;--text2:#636c76;--text3:#8c959f;--green:#1a7f37;--green-h:#2ea043;--green-glow:#2ea043;--green-bg:#dafbe1;--green-border:#4ac26b;--red:#d1242f;--red-bg:#fff5f5;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:2rem}
.card-logo{display:flex;align-items:center;gap:.6rem;font-weight:800;font-size:1.05rem;margin-bottom:1.75rem;justify-content:center}
.logo-sq{width:28px;height:28px;background:var(--green);border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:.75rem;flex-shrink:0}
.title{font-size:1rem;font-weight:700;margin-bottom:.4rem}
.sub{font-size:.82rem;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
.field{margin-bottom:1rem}
.label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.4rem}
.input{width:100%;padding:.6rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:.9rem;color:var(--text);background:var(--bg3);outline:none;font-family:inherit;transition:border .15s}
.input:focus{border-color:var(--green);background:var(--bg)}
.input::placeholder{color:var(--text3)}
.pw-wrap{position:relative}
.pw-wrap .input{padding-right:2.5rem}
.pw-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);user-select:none}
.pw-eye:hover{color:var(--text)}
.strength{height:3px;border-radius:2px;margin-top:.5rem;background:var(--bg3);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.hint{font-size:.73rem;color:var(--text3);margin-top:.3rem}
.submit{width:100%;padding:.65rem;background:var(--green);border:1px solid var(--green-border);color:#fff;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.submit:hover{background:var(--green-h)}
.submit:disabled{opacity:.5;cursor:not-allowed}
.err{background:var(--red-bg);border:1px solid var(--red);color:var(--red);padding:.6rem .875rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}
.err.show{display:block}
.ok-msg{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green-glow);padding:.6rem .875rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}
.ok-msg.show{display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .6s linear infinite;vertical-align:middle;margin-right:.4rem}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo"><div class="logo-sq">UG</div>Drive</div>
  <div class="title">Set New Password</div>
  <div class="sub">Enter your new password below. The link expires after 1 hour and can only be used once.</div>

  <div class="err" id="err"></div>
  <div class="ok-msg" id="ok"></div>

  <div id="main-form">
    <div class="field">
      <label class="label">New password</label>
      <div class="pw-wrap">
        <input class="input" type="password" id="new-pwd" placeholder="Min 8 characters" oninput="checkStrength(this.value)">
        <span class="pw-eye" onclick="togglePw('new-pwd',this)">👁</span>
      </div>
      <div class="strength"><div class="strength-fill" id="sf" style="width:0%"></div></div>
      <div class="hint" id="sh">Use 8+ characters with numbers and symbols</div>
    </div>
    <div class="field">
      <label class="label">Confirm new password</label>
      <div class="pw-wrap">
        <input class="input" type="password" id="confirm-pwd" placeholder="Repeat password">
        <span class="pw-eye" onclick="togglePw('confirm-pwd',this)">👁</span>
      </div>
    </div>
    <button class="submit" id="sub-btn" onclick="doReset()">Set New Password</button>
  </div>
</div>

<script>
function togglePw(id,el){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';el.textContent=i.type==='password'?'👁':'🙈'}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');document.getElementById('ok').classList.remove('show')}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.classList.add('show');document.getElementById('err').classList.remove('show')}

function checkStrength(pwd){
  const sf=document.getElementById('sf'),sh=document.getElementById('sh');
  let s=0;
  if(pwd.length>=8)s++;if(pwd.length>=12)s++;if(/[0-9]/.test(pwd))s++;
  if(/[^a-zA-Z0-9]/.test(pwd))s++;if(/[A-Z]/.test(pwd)&&/[a-z]/.test(pwd))s++;
  const c=['#f85149','#f85149','#fb8f44','#e3b341','#2ea043','#3fb950'];
  const l=['Too short','Weak','Okay','Good','Strong','Very strong'];
  sf.style.width=[0,20,40,60,80,100][s]+'%';sf.style.background=c[s];sh.textContent=l[s];
}

const token = new URLSearchParams(window.location.search).get('token');
if(!token){
  document.getElementById('main-form').style.display='none';
  showErr('Invalid or missing reset token. Please request a new reset link.');
}

async function doReset(){
  const pwd=document.getElementById('new-pwd').value;
  const pwd2=document.getElementById('confirm-pwd').value;
  if(!pwd){showErr('Please enter a new password');return}
  if(pwd.length<8){showErr('Password must be at least 8 characters');return}
  if(pwd!==pwd2){showErr('Passwords do not match');return}
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Setting password…';
  try{
    const r=await fetch('/api/auth/reset-password',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,password:pwd})
    });
    const d=await r.json().catch(()=>({}));
    if(r.ok){
      showOk('Password changed successfully! Redirecting to login…');
      document.getElementById('main-form').style.display='none';
      setTimeout(()=>{window.location.href='/login'},2000);
    } else {
      showErr(d.detail||'Reset failed. The link may have expired or already been used.');
    }
  }catch{showErr('Connection error. Try again.')}
  btn.disabled=false;btn.textContent='Set New Password';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doReset()});
</script>
</body>
</html>
